name: Update OTA Automatico
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      app_name:
        description: "Nombre de la app"
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v3

      - name: Configurar Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: "npm"

      - name: Configurar Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Instalar dependencias
        run: npm install

      - name: Publicar Actualización OTA
        run: |
          # Esto sube el JS a la nube de Expo en segundos
          eas update --branch preview --message "Update via NFC: ${{ github.event.inputs.app_name }}"

      - name: Avisar a Telegram
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
          -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d "text=🚀 ¡Update de ${{ github.event.inputs.app_name }} enviado! Abre tu app para ver los cambios."
