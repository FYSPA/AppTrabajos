name: Compilar APK via NFC
on:
  workflow_dispatch:
    inputs:
      app_name:
        description: "Nombre de la app"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v3

      - name: Configurar Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: "npm"

      - name: Configurar Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Instalar dependencias
        run: npm install

      - name: Compilar APK
        id: build_apk
        # Este comando compila y genera el link. El --no-wait es opcional,
        # pero si queremos el link final, dejaremos que termine.
        run: |
          BUILD_URL=$(eas build --platform android --profile preview --non-interactive | grep "https://expo.dev/artifacts" | tail -1)
          echo "url=$BUILD_URL" >> $GITHUB_OUTPUT

      - name: Enviar Link a Telegram
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d text="✅ ¡Jefe, el APK de ${{ github.event.inputs.app_name }} está listo! Descárgalo aquí: ${{ steps.build_apk.outputs.url }}"
